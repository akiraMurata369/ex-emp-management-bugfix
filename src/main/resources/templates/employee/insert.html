<!DOCTYPE html>
<html
  lang="ja"
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>従業員管理システム</title>
    <link
      rel="stylesheet"
      href="../../static/css/bootstrap.css"
      th:href="@{/css/bootstrap.css}"
    />
    <link
      rel="stylesheet"
      href="../../static/css/style.css"
      th:href="@{/css/style.css}"
    />
    <!--[if lt IE 9]>
      <script src="https://oss.maxcdn.com/html5shiv/3.7.2/html5shiv.min.js"></script>
      <script src="https://oss.maxcdn.com/respond/1.4.2/respond.min.js"></script>
    <![endif]-->
  </head>
  <body>
    <div class="container">
      <nav class="navbar navbar-default">
        <div class="container-fluid">
          <!-- Brand and toggle get grouped for better mobile display -->
          <div class="navbar-header">
            <button
              type="button"
              class="navbar-toggle collapsed"
              data-toggle="collapse"
              data-target="#bs-example-navbar-collapse-1"
              aria-expanded="false"
            >
              <span class="sr-only">Toggle navigation</span>
              <span class="icon-bar"></span> <span class="icon-bar"></span>
              <span class="icon-bar"></span>
            </button>
            <a
              class="navbar-brand"
              href="list.html"
              th:href="@{/employee/showList}"
            >
              <!-- 企業ロゴ -->
              <img
                src="../../static/img/header_logo_small.png"
                th:src="@{/img/header_logo_small.png}"
              />
            </a>
          </div>

          <!-- Collect the nav links, forms, and other content for toggling -->
          <div
            class="collapse navbar-collapse"
            id="bs-example-navbar-collapse-1"
          >
            <ul class="nav navbar-nav">
              <li class="active">
                <a href="list.html" th:href="@{/employee/showList}"
                  >従業員管理</a
                >
              </li>
              <li>
                <a href="insert.html" th:href="@{/employee/toInsert}"
                  >従業員追加</a
                >
              </li>
            </ul>
            <p class="navbar-text navbar-right">
              <span th:text="${session.administratorName}">山田太郎</span
              >さんこんにちは！ &nbsp;&nbsp;&nbsp;
              <a
                href="../administrator/login.html"
                class="navbar-link"
                th:href="@{/logout}"
                >ログアウト</a
              >
            </p>
          </div>
          <!-- /.navbar-collapse -->
        </div>
        <!-- /.container-fluid -->
      </nav>

      <!-- パンくずリスト -->
      <ol class="breadcrumb">
        <li class="active">
          <a href="list.html" th:href="@{/employee/showList}">従業員リスト</a>
        </li>
        <li class="active">従業員追加</li>
      </ol>

      <!-- register form -->
      <div class="row">
        <div
          class="col-lg-offset-2 col-lg-8 col-md-offset-2 col-md-8 col-sm-12 col-xs-12"
        >
          <!-- 背景をグレーに、埋め込んだようなコンポーネント -->
          <div class="well">
            <!-- ここから上を編集する必要はありません -->

            <!-- ここにモックのform要素を貼り付けます -->

            <form
              method="post"
              th:action="@{/employee/insert}"
              th:object="${insertEmployeeForm}"
              enctype="multipart/form-data"
            >
              <fieldset>
                <legend>従業員追加</legend>
                <table class="table table-striped">
                  <tr>
                    <th nowrap>従業員名</th>
                    <td>
                      <label th:errors="*{name}" class="error-messages">
                      </label>
                      <label
                        class="control-label"
                        style="color: red"
                        for="name"
                      ></label>
                      <input
                        type="text"
                        name="name"
                        id="name"
                        class="form-control"
                        th:errorclass="error-input"
                      />
                    </td>
                  </tr>
                  <tr>
                    <th nowrap>写真(png/jpg)</th>
                    <td>
                      <label th:errors="*{image}" class="error-messages">
                      </label>
                      <label
                        class="control-label"
                        style="color: red"
                        for="image"
                      ></label>
                      <input
                        type="file"
                        name="image"
                        id="image"
                        th:errorclass="error-input"
                      />
                    </td>
                  </tr>
                  <tr>
                    <th nowrap>性別</th>
                    <td>
                      <label th:errors="*{gender}" class="error-messages">
                      </label>
                      <label
                        class="control-label"
                        style="color: red"
                        for="gender"
                      ></label>
                      <input
                        type="text"
                        name="gender"
                        id="gender"
                        class="form-control"
                        th:errorclass="error-input"
                      />
                    </td>
                  </tr>
                  <tr>
                    <th nowrap>入社日</th>
                    <td>
                      <label th:errors="*{hireDate}" class="error-messages">
                      </label>
                      <label
                        class="control-label"
                        style="color: red"
                        for="gender"
                      ></label>
                      <input
                        type="date"
                        name="hireDate"
                        id="hireDate"
                        class="form-control"
                        th:errorclass="error-input"
                      />
                    </td>
                  </tr>
                  <tr>
                    <th nowrap>メールアドレス</th>
                    <td>
                      <label th:errors="*{mailAddress}" class="error-messages">
                      </label>
                      <label
                        class="control-label"
                        style="color: red"
                        for="mailAddress"
                      ></label>
                      <input
                        type="text"
                        name="mailAddress"
                        id="mailAddress"
                        class="form-control"
                        th:errorclass="error-input"
                      />
                    </td>
                  </tr>
                  <tr>
                    <th nowrap>郵便番号</th>
                    <td>
                      <label th:errors="*{zipCode}" class="error-messages">
                      </label>
                      <label
                        class="control-label"
                        style="color: red"
                        for="zipCode"
                      ></label>
                      <input
                        type="number"
                        name="zipCode"
                        id="zipCode"
                        class="form-control"
                        th:errorclass="error-input"
                      />
                    </td>
                  </tr>
                  <tr>
                    <th nowrap>住所</th>
                    <td>
                      <label th:errors="*{address}" class="error-messages">
                      </label>
                      <label
                        class="control-label"
                        style="color: red"
                        for="address"
                      ></label>
                      <input
                        type="text"
                        name="address"
                        id="address"
                        class="form-control"
                        th:errorclass="error-input"
                      />
                    </td>
                  </tr>
                  <tr>
                    <th nowrap>電話番号</th>
                    <td>
                      <label th:errors="*{telephone}" class="error-messages">
                      </label>
                      <label
                        class="control-label"
                        style="color: red"
                        for="telephone"
                      ></label>
                      <input
                        type="text"
                        name="telephone"
                        id="telephone"
                        class="form-control"
                        th:errorclass="error-input"
                      />
                    </td>
                  </tr>
                  <tr>
                    <th nowrap>給料</th>
                    <td>
                      <label th:errors="*{salary}" class="error-messages">
                      </label>
                      <label
                        class="control-label"
                        style="color: red"
                        for="salary"
                      ></label>
                      <input
                        type="number"
                        name="salary"
                        id="salary"
                        class="form-control"
                        th:errorclass="error-input"
                      />
                    </td>
                  </tr>
                  <tr>
                    <th nowrap>特性</th>
                    <td>
                      <label
                        th:errors="*{characteristics}"
                        class="error-messages"
                      >
                      </label>
                      <label
                        class="control-label"
                        style="color: red"
                        for="characteristics"
                      ></label>
                      <input
                        type="text"
                        name="characteristics"
                        id="characteristics"
                        class="form-control"
                        th:errorclass="error-input"
                      />
                    </td>
                  </tr>
                  <tr>
                    <th nowrap>扶養人数</th>
                    <td>
                      <label
                        th:errors="*{dependentsCount}"
                        class="error-messages"
                      >
                      </label>
                      <label
                        class="control-label"
                        style="color: red"
                        for="dependentsCount"
                      ></label>
                      <input
                        type="number"
                        name="dependentsCount"
                        id="dependentsCount"
                        class="form-control"
                        th:errorclass="error-input"
                      />
                    </td>
                  </tr>
                </table>
                <button type="submit" class="btn btn-primary">追加</button>
              </fieldset>
            </form>

            <!-- ここから下を編集する必要はありません -->
          </div>
        </div>
      </div>
    </div>
    <!-- end container -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.11.3/jquery.min.js"></script>
    <script src="../../static/js/bootstrap.min.js"></script>
  </body>
</html>
